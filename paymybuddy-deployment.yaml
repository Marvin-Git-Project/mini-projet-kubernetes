# Deployment PayMyBuddy
# Application SpringBoot qui se connecte à la base MySQL via le service "mysql-service"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
spec:
  replicas: 1
  # Le selector cible les pods ayant le label "app: paymybuddy"
  selector:
    matchLabels:
      app: paymybuddy
  # Template = le moule utilisé pour créer chaque pod
  # Tout ce qui est en dessous décrit à quoi ressemble un pod
  template:
    metadata:
      labels: # Label collé sur chaque pod créé --> DOIT être identique au "selector:" ci-dessus
        app: paymybuddy
    spec: # Liste des conteneurs qui tournent dans chaque pod (on en a qu'un : paymybuddy)
      containers:
      - name: paymybuddy
        # Image construite localement depuis le code source du repo GitHub
        image: paymybuddy:latest
        # Never --> Kubernetes utilise l'image locale, ne cherche pas sur Docker Hub
        imagePullPolicy: Never

        # Variables d'environnement récupérées depuis le Dockerfile du projet
        # On les sépare maintenant en 2 catégories : ConfigMap (non sensible) et Secret (sensible)
        env:
        # Username --> donnée non sensible, stockée dans le ConfigMap "db-config"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: spring-datasource-username

        # Password --> donnée sensible, stockée dans le Secret "db-secret"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: spring-datasource-password

        # URL de connexion --> donnée non sensible, stockée dans le ConfigMap "db-config"
        # Contient déjà "mysql-service", le nom du Service qui permet de joindre le pod MySQL
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: spring-datasource-url

        # Port sur lequel l'application SpringBoot écoute
        ports:
        - containerPort: 8080

        # Volume monté dans /data du conteneur pour persister les données
        volumeMounts:
        - name: paymybuddy-data
          mountPath: /data

      volumes:
      # Volume persistant pour les données PayMyBuddy --> géré via PVC/PV au lieu d'un hostPath direct
      - name: paymybuddy-data
        persistentVolumeClaim:
          claimName: paymybuddy-pvc
