# Deployment MySQL
# Le Deployment gère le cycle de vie des pods (création, mise à jour, redémarrage)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        env:
        # Mot de passe root --> donnée sensible, on la récupère depuis le Secret
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: mysql-root-password
        # Nom de la base --> donnée non sensible, on la récupère depuis le ConfigMap
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: mysql-database

        # readinessProbe : Kubernetes teste périodiquement si MySQL est prêt
        # à accepter des connexions avant de le considérer comme disponible
        # On passe par un shell (sh -c) pour pouvoir interpoler la variable
        # d'environnement MYSQL_ROOT_PASSWORD plutôt que d'écrire le mot de
        # passe en clair dans la commande
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      # Volume persistant pour les données MySQL --> géré via PVC/PV au lieu d'un hostPath direct
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-init
        configMap:
          name: mysql-init-scripts
